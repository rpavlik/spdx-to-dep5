[package]
authors = ["Ryan Pavlik <ryan.pavlik@collabora.com>"]
description = "A tool to help in Debian package maintenance, converting SPDX tag-value files, often extracted by REUSE, into a basic debian/copyright file."
edition = "2018"
name = "spdx-to-dep5"
version = "0.5.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
clap = {version = "4.0", features = ["derive", "cargo"]}
copyright_statements = {version = "=0.5.0", path = "copyright_statements"}
derive_more = "0.99"
env_logger = "0.10"
indextree = "4.5"
itertools = "0.10"
lazy_static = "1.4"
log = "0.4"
nom = "7.1"
regex = "1.6"
spdx-rs = "0.5.0"
thiserror = "1.0"
typed-index-collections = "3.1"
atom_table = "1.0.0"

[workspace]
members = [
  "copyright_statements",
]
